name: codeql

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "27 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    if: ${{ !github.event.repository.private || vars.ENABLE_CODEQL == 'true' }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          queries: security-extended,security-and-quality

      - name: Restore non-MAUI projects
        run: |
          dotnet restore src/MultiAgentTaskSolver.Core/MultiAgentTaskSolver.Core.csproj
          dotnet restore src/MultiAgentTaskSolver.Infrastructure/MultiAgentTaskSolver.Infrastructure.csproj

      - name: Build non-MAUI projects
        run: |
          dotnet build src/MultiAgentTaskSolver.Core/MultiAgentTaskSolver.Core.csproj --configuration Release --no-restore
          dotnet build src/MultiAgentTaskSolver.Infrastructure/MultiAgentTaskSolver.Infrastructure.csproj --configuration Release --no-restore

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"
