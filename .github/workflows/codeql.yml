name: codeql

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "27 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    if: ${{ !github.event.repository.private || vars.ENABLE_CODEQL == 'true' }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["csharp"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Install MAUI workload
        run: dotnet workload restore

      - name: Restore
        run: dotnet restore MultiAgentTaskSolver.sln

      - name: Build
        run: dotnet build MultiAgentTaskSolver.sln --configuration Release --no-restore -p:PublishReadyToRun=false

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
