name: dotnet

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-test-and-coverage:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install MAUI workload
        run: dotnet workload restore

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore MultiAgentTaskSolver.sln

      - name: Build
        run: dotnet build MultiAgentTaskSolver.sln --configuration Release --no-restore

      - name: Test with coverage
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/test-results | Out-Null
          dotnet test MultiAgentTaskSolver.sln --configuration Release --no-build --collect:"XPlat Code Coverage" --logger "trx;LogFilePrefix=test-results" --results-directory artifacts/test-results

      - name: Generate coverage report
        shell: pwsh
        run: |
          dotnet tool run reportgenerator "-reports:artifacts/test-results/**/coverage.cobertura.xml" "-targetdir:artifacts/coverage" "-reporttypes:HtmlInline;Cobertura;MarkdownSummaryGithub"
          if (Test-Path "artifacts/coverage/SummaryGithub.md") {
            Get-Content "artifacts/coverage/SummaryGithub.md" >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Audit NuGet packages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          dotnet package list --project MultiAgentTaskSolver.sln --vulnerable --include-transitive --format json --no-restore | Set-Content artifacts/package-audit.json -Encoding utf8

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results/**
          if-no-files-found: error

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: artifacts/coverage/**
          if-no-files-found: error

      - name: Upload dependency audit
        uses: actions/upload-artifact@v4
        with:
          name: package-audit
          path: artifacts/package-audit.json
          if-no-files-found: error

      - name: Upload coverage to Codecov
        if: ${{ (vars.ENABLE_CODECOV == 'true' || !github.event.repository.private) && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: artifacts/coverage/Cobertura.xml
          fail_ci_if_error: false
          verbose: true
