name: dotnet

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-test-and-coverage:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install MAUI workload
        run: dotnet workload restore

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore MultiAgentTaskSolver.sln

      - name: Build
        run: dotnet build MultiAgentTaskSolver.sln --configuration Release --no-restore -p:PublishReadyToRun=false

      - name: Test with coverage
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/test-results | Out-Null
          dotnet test MultiAgentTaskSolver.sln --configuration Release --no-build --collect:"XPlat Code Coverage" --logger "trx;LogFilePrefix=test-results" --results-directory artifacts/test-results

      - name: Generate coverage report
        shell: pwsh
        run: |
          dotnet tool run reportgenerator "-reports:artifacts/test-results/**/coverage.cobertura.xml" "-targetdir:artifacts/coverage" "-reporttypes:HtmlInline;Cobertura;MarkdownSummaryGithub"
          if (Test-Path "artifacts/coverage/SummaryGithub.md") {
            Get-Content "artifacts/coverage/SummaryGithub.md" >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Enforce coverage thresholds
        shell: pwsh
        run: |
          $xml = [xml](Get-Content "artifacts/coverage/Cobertura.xml")
          $thresholds = @{
            "MultiAgentTaskSolver.Core"           = @{ Lines = 65; Branches = 20 }
            "MultiAgentTaskSolver.Infrastructure"  = @{ Lines = 70; Branches = 35 }
          }
          $failed = $false
          foreach ($pkg in $xml.coverage.packages.package) {
            $name = $pkg.name
            if (-not $thresholds.ContainsKey($name)) { continue }
            $lines = [math]::Round([double]$pkg.'line-rate' * 100, 1)
            $branches = [math]::Round([double]$pkg.'branch-rate' * 100, 1)
            $t = $thresholds[$name]
            Write-Host "$name : lines=${lines}% (min $($t.Lines)%) branches=${branches}% (min $($t.Branches)%)"
            if ($lines -lt $t.Lines) { Write-Host "::error::$name line coverage ${lines}% is below $($t.Lines)% threshold"; $failed = $true }
            if ($branches -lt $t.Branches) { Write-Host "::error::$name branch coverage ${branches}% is below $($t.Branches)% threshold"; $failed = $true }
          }
          if ($failed) { exit 1 }
          Write-Host "All coverage thresholds met."

      - name: Audit NuGet packages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          dotnet package list --project MultiAgentTaskSolver.sln --vulnerable --include-transitive --format json --no-restore | Set-Content artifacts/package-audit.json -Encoding utf8

      - name: Upload test results
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: artifacts/test-results/**
          if-no-files-found: error

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: artifacts/coverage/**
          if-no-files-found: error

      - name: Upload dependency audit
        uses: actions/upload-artifact@v6
        with:
          name: package-audit
          path: artifacts/package-audit.json
          if-no-files-found: error

      - name: Upload coverage to Codecov
        if: ${{ (vars.ENABLE_CODECOV == 'true' || !github.event.repository.private) && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          files: artifacts/coverage/Cobertura.xml
          fail_ci_if_error: false
          verbose: true
