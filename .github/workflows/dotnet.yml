name: dotnet

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install MAUI workload
        run: dotnet workload restore

      - name: Restore
        run: dotnet restore MultiAgentTaskSolver.sln

      - name: Build
        run: dotnet build MultiAgentTaskSolver.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test MultiAgentTaskSolver.sln --configuration Release --no-build
